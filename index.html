<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devi Sri Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(90deg,#041827,#06263d,#041827);
color:white;
overflow-x:hidden;
}

/* SIDEBAR */
.sidebar{
position:fixed;
top:0;
left:0;
width:220px;
height:100%;
background:#072540;
display:flex;
flex-direction:column;
padding-top:40px;
z-index:1000;
}

.sidebar a{
padding:15px 25px;
text-decoration:none;
color:white;
font-size:18px;
transition:0.3s;
}

.sidebar a:hover{
background:#00e5ff;
color:black;
}

/* HERO */
.hero{
height:100vh;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 60px;
margin-left:220px;
}

/* TEXT */
.text{
max-width:600px;
}

.text h3{
font-size:28px;
margin-bottom:10px;
}

.text h1{
font-size:70px;
margin-bottom:10px;
}

.text h2{
font-size:35px;
margin-bottom:20px;
}

.text p{
font-size:18px;
line-height:1.8;
margin-bottom:30px;
}

.highlight{
color:#00e5ff;
}

/* BUTTONS */
.hero-buttons{
display:flex;
gap:20px;
align-items:center;
margin-top:20px;
}

.btn{
display:inline-block;
padding:15px 35px;
background:#00e5ff;
color:black;
text-decoration:none;
border-radius:40px;
font-weight:bold;
box-shadow:0 0 20px #00e5ff;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}

.resume-btn{
background:transparent;
border:2px solid #00e5ff;
color:#00e5ff;
box-shadow:none;
}

.resume-btn:hover{
background:#00e5ff;
color:black;
}

/* IMAGE */
.image img{
width:420px;
height:420px;
border-radius:50%;
object-fit:cover;
border:6px solid #00e5ff;
box-shadow:0 0 20px #00e5ff,
0 0 40px #00e5ff,
0 0 70px #c84dff,
0 0 100px #c84dff;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

</div>

<!-- HERO -->
<section class="hero">

<div class="text">
<h3>Hello, It's Me</h3>
<h1>Devi Sri</h1>

<h2>And I'm a <span class="highlight">Software Developer</span></h2>

<p>
Aspiring Software Developer & AI Enthusiast passionate about Web Development, AI and innovative software solutions.
</p>

<div class="hero-buttons">
<a href="image/myresume.png" target="_blank" class="btn resume-btn">View Resume</a>
</div>

</div>

<div class="image">
<img src="image/profile.jpg" alt="profile">
</div>

</section>

</body>
</html>
