<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* BACKGROUND (same theme) */
body{
background: radial-gradient(circle at top left,#0b1220,#050816,#0a0f1f);
color:white;
}

/* SIDEBAR */
.sidebar{
position:fixed;
top:0;
left:0;
width:240px;
height:100vh;
background:rgba(10,15,31,0.85);
backdrop-filter: blur(12px);
border-right:1px solid rgba(34,211,238,0.2);
display:flex;
flex-direction:column;
padding-top:40px;
}

.sidebar a{
padding:14px 20px;
text-decoration:none;
color:white;
font-size:16px;
border-left:3px solid transparent;
transition:0.3s;
}

.sidebar a:hover{
background:rgba(34,211,238,0.1);
border-left:3px solid #22d3ee;
color:#22d3ee;
}

/* MAIN */
.main{
margin-left:260px;
padding:60px 40px;
}

/* TITLE */
h1{
font-size:45px;
margin-bottom:10px;
}

.highlight{
color:#22d3ee;
}

.subtitle{
color:rgba(255,255,255,0.7);
margin-bottom:40px;
}

/* GRID */
.contact-container{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));
gap:30px;
}

/* INFO BOX */
.info-box{
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:15px;
border:1px solid rgba(34,211,238,0.2);
box-shadow:0 0 20px rgba(34,211,238,0.08);
}

.info-box h2{
color:#22d3ee;
margin-bottom:15px;
}

.info-box p{
margin-bottom:10px;
color:#ddd;
opacity:0.9;
}

/* SOCIAL */
.social{
margin-top:15px;
display:flex;
gap:12px;
flex-wrap:wrap;
}

.social a{
padding:10px 16px;
background:transparent;
color:#22d3ee;
text-decoration:none;
border-radius:30px;
border:1px solid #22d3ee;
transition:0.3s;
font-size:14px;
}

.social a:hover{
background:#22d3ee;
color:black;
transform:scale(1.05);
}

/* FORM */
.form-box{
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:15px;
border:1px solid rgba(34,211,238,0.2);
box-shadow:0 0 20px rgba(34,211,238,0.08);
}

.form-box input,
.form-box textarea{
width:100%;
padding:12px;
margin-bottom:15px;
border:none;
outline:none;
border-radius:10px;
background:rgba(255,255,255,0.1);
color:white;
border:1px solid rgba(255,255,255,0.1);
}

.form-box input:focus,
.form-box textarea:focus{
border:1px solid #22d3ee;
}

.form-box textarea{
height:130px;
resize:none;
}

/* BUTTON */
.form-box button{
width:100%;
padding:12px;
border:none;
border-radius:30px;
background:#22d3ee;
color:black;
font-weight:600;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 20px rgba(34,211,238,0.3);
}

.form-box button:hover{
transform:scale(1.03);
}

/* POPUP */
.popup{
position:fixed;
top:20px;
right:20px;
background:#22d3ee;
color:black;
padding:12px 18px;
border-radius:8px;
display:none;
font-weight:600;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<a href="home.html">Home</a>
<a href="about.html">About</a>
<a href="skills.html">Skills</a>
<a href="projects.html">Projects</a>
<a href="certificates.html">Certificates</a>
<a href="contact.html">Contact</a>
</div>

<!-- MAIN -->
<div class="main">

<h1>Contact <span class="highlight">Me</span></h1>
<p class="subtitle">Feel free to reach out for opportunities or collaboration</p>

<div class="contact-container">

<!-- INFO -->
<div class="info-box">
<h2>Get In Touch</h2>

<p>📧 Email: devisri23082005@gmail.com</p>
<p>📱 Phone: +91 8106182276</p>
<p>📍 Location: Andhra Pradesh, India</p>

<div class="social">

<a href="https://www.linkedin.com" target="_blank">LinkedIn</a>
<a href="https://github.com" target="_blank">GitHub</a>

</div>

</div>

<!-- FORM -->
<div class="form-box">

<input id="name" type="text" placeholder="Your Name">
<input id="email" type="email" placeholder="Your Email">
<textarea id="message" placeholder="Your Message"></textarea>

<button onclick="sendMessage()">Send Message</button>

</div>

</div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">Message Sent Successfully ✅</div>

<script>
function sendMessage(){
let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let message=document.getElementById("message").value;

if(name==""||email==""||message==""){
alert("Please fill all fields");
return;
}

document.getElementById("popup").style.display="block";

setTimeout(()=>{
document.getElementById("popup").style.display="none";
},3000);

document.getElementById("name").value="";
document.getElementById("email").value="";
document.getElementById("message").value="";
}
</script>

</body>
</html>
