<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(90deg,#041827,#06263d,#041827);
color:white;
}

/* SIDEBAR */
.sidebar{
position:fixed;
top:0;
left:0;
width:220px;
height:100%;
background:#072540;
display:flex;
flex-direction:column;
padding-top:40px;
}

.sidebar a{
padding:15px 25px;
text-decoration:none;
color:white;
font-size:18px;
transition:0.3s;
}

.sidebar a:hover{
background:#00e5ff;
color:black;
}

/* MAIN */
.main{
margin-left:240px;
padding:60px 40px;
}

/* TITLE */
h1{
font-size:45px;
margin-bottom:10px;
}

.highlight{
color:#00e5ff;
}

.subtitle{
color:#aaa;
margin-bottom:40px;
}

/* CONTACT GRID */
.contact-container{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));
gap:30px;
}

/* INFO BOX */
.info-box{
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:15px;
border:1px solid rgba(255,255,255,0.1);
}

.info-box h2{
color:#00e5ff;
margin-bottom:15px;
}

.info-box p{
margin-bottom:10px;
color:#ddd;
}

/* SOCIAL */
.social{
margin-top:15px;
display:flex;
gap:12px;
flex-wrap:wrap;
}

.social a{
padding:10px 16px;
background:rgba(0,229,255,0.15);
color:#00e5ff;
text-decoration:none;
border-radius:10px;
border:1px solid #00e5ff;
transition:0.3s;
}

.social a:hover{
background:#00e5ff;
color:black;
}

/* FORM */
.form-box{
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:15px;
border:1px solid rgba(255,255,255,0.1);
}

.form-box input,
.form-box textarea{
width:100%;
padding:10px;
margin-bottom:15px;
border:none;
outline:none;
border-radius:8px;
background:rgba(255,255,255,0.1);
color:white;
}

.form-box textarea{
height:120px;
resize:none;
}

.form-box button{
padding:10px 18px;
background:#00e5ff;
border:none;
border-radius:8px;
font-weight:600;
cursor:pointer;
transition:0.3s;
width:100%;
}

.form-box button:hover{
background:white;
}

/* POPUP */
.popup{
position:fixed;
top:20px;
right:20px;
background:#00e5ff;
color:black;
padding:12px 18px;
border-radius:8px;
display:none;
font-weight:600;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<a href="home.html">Home</a>
<a href="about.html">About</a>
<a href="skills.html">Skills</a>
<a href="projects.html">Projects</a>
<a href="certificates.html">Certificates</a>
<a href="contact.html">Contact</a>
</div>

<!-- MAIN -->
<div class="main">

<h1>Contact <span class="highlight">Me</span></h1>
<p class="subtitle">Feel free to reach out for opportunities or collaboration</p>

<div class="contact-container">

<!-- INFO -->
<div class="info-box">
<h2>Get In Touch</h2>

<p>📧 Email: devisri23082005@gmail.com</p>
<p>📱 Phone: +91 8106182276</p>
<p>📍 Location: Andhra Pradesh, India</p>

<!-- SOCIAL LINKS (FIXED) -->
<div class="social">

<a href="https://www.linkedin.com/in/devisri-nadupuru-4564532a9" target="_blank">
🔗 LinkedIn
</a>

<a href="https://github.com/DevisriNadupuru" target="_blank">
💻 GitHub
</a>

</div>

</div>

<!-- FORM -->
<div class="form-box">

<input id="name" type="text" placeholder="Your Name">
<input id="email" type="email" placeholder="Your Email">
<textarea id="message" placeholder="Your Message"></textarea>

<button onclick="sendMessage()">Send Message</button>

</div>

</div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">Message Sent Successfully ✅</div>

<script>
function sendMessage(){

let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let message = document.getElementById("message").value;

if(name === "" || email === "" || message === ""){
alert("Please fill all fields");
return;
}

document.getElementById("popup").style.display = "block";

setTimeout(()=>{
document.getElementById("popup").style.display = "none";
}, 3000);

document.getElementById("name").value = "";
document.getElementById("email").value = "";
document.getElementById("message").value = "";
}
</script>

</body>
</html>
