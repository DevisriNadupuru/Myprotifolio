<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* BACKGROUND */
body{
background: radial-gradient(circle at top left,#0b1220,#050816,#0a0f1f);
color:white;
}

/* SIDEBAR */
.sidebar{
position:fixed;
top:0;
left:0;
width:240px;
height:100vh;
background:rgba(10,15,31,0.85);
backdrop-filter: blur(12px);
border-right:1px solid rgba(34,211,238,0.2);
display:flex;
flex-direction:column;
padding-top:40px;
}

.sidebar a{
padding:14px 20px;
text-decoration:none;
color:white;
font-size:16px;
border-left:3px solid transparent;
transition:0.3s;
}

.sidebar a:hover{
background:rgba(34,211,238,0.1);
border-left:3px solid #22d3ee;
color:#22d3ee;
}

/* MAIN */
.main{
margin-left:260px;
padding:60px 40px;
}

h1{
font-size:45px;
margin-bottom:10px;
}

.highlight{
color:#22d3ee;
}

.subtitle{
opacity:0.7;
margin-bottom:30px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(34,211,238,0.2);
border-radius:15px;
padding:20px;
box-shadow:0 0 20px rgba(34,211,238,0.08);
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 25px rgba(34,211,238,0.25);
}

/* TITLE */
.card h2{
color:#22d3ee;
margin-bottom:15px;
font-size:20px;
display:flex;
align-items:center;
gap:10px;
}

/* SKILL */
.skill{
margin-bottom:15px;
}

.name{
font-size:14px;
margin-bottom:6px;
display:flex;
justify-content:space-between;
}

/* BAR */
.bar{
width:100%;
height:8px;
background:rgba(255,255,255,0.1);
border-radius:20px;
overflow:hidden;
}

.progress{
height:100%;
width:0;
border-radius:20px;
background:linear-gradient(90deg,#22d3ee,#a855f7);
animation:fill 2s forwards;
}

/* ANIMATION */
@keyframes fill{
to{width:var(--w);}
}

/* ICON STYLE */
.icon{
font-size:18px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<a href="home.html">Home</a>
<a href="about.html">About</a>
<a href="skills.html">Skills</a>
<a href="projects.html">Projects</a>
<a href="certificates.html">Certificates</a>
<a href="contact.html">Contact</a>
</div>

<!-- MAIN -->
<div class="main">

<h1>My <span class="highlight">Skills</span></h1>
<p class="subtitle">Technical expertise and tools I work with</p>

<div class="grid">

<!-- FRONTEND -->
<div class="card">
<h2><span class="icon">💻</span> Frontend</h2>

<div class="skill">
<div class="name"><span>HTML</span><span>95%</span></div>
<div class="bar"><div class="progress" style="--w:95%"></div></div>
</div>

<div class="skill">
<div class="name"><span>CSS</span><span>90%</span></div>
<div class="bar"><div class="progress" style="--w:90%"></div></div>
</div>

<div class="skill">
<div class="name"><span>JavaScript</span><span>75%</span></div>
<div class="bar"><div class="progress" style="--w:75%"></div></div>
</div>

</div>

<!-- PROGRAMMING -->
<div class="card">
<h2><span class="icon">🧠</span> Programming</h2>

<div class="skill">
<div class="name"><span>Python</span><span>85%</span></div>
<div class="bar"><div class="progress" style="--w:85%"></div></div>
</div>

<div class="skill">
<div class="name"><span>Java</span><span>70%</span></div>
<div class="bar"><div class="progress" style="--w:70%"></div></div>
</div>

<div class="skill">
<div class="name"><span>C</span><span>80%</span></div>
<div class="bar"><div class="progress" style="--w:80%"></div></div>
</div>

</div>

<!-- TOOLS -->
<div class="card">
<h2><span class="icon">🛠️</span> Tools</h2>

<div class="skill">
<div class="name"><span>Git & GitHub</span><span>75%</span></div>
<div class="bar"><div class="progress" style="--w:75%"></div></div>
</div>

<div class="skill">
<div class="name"><span>SQL</span><span>70%</span></div>
<div class="bar"><div class="progress" style="--w:70%"></div></div>
</div>

</div>

</div>

</div>

</body>
</html>
